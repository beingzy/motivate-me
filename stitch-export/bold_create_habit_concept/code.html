<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Habit - Motivate Me</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4747ff",
                        "background-light": "#f5f5f8",
                        "background-dark": "#0f0f23",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-toggle:checked + .toggle-dot {
            transform: translateX(100%);
            background-color: white;
        }
        .custom-toggle:checked {
            background-color: #4747ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-end justify-center">
<!-- Mobile Screen Wrapper -->
<div class="relative w-full max-w-md h-[932px] bg-slate-200 dark:bg-slate-900 overflow-hidden shadow-2xl flex flex-col justify-end">
<!-- Background/Underlying Content Preview -->
<div class="absolute inset-0 p-6 opacity-40">
<div class="flex justify-between items-center mb-8">
<div class="h-10 w-10 rounded-full bg-white/80 dark:bg-slate-800"></div>
<div class="h-6 w-24 rounded-full bg-white/80 dark:bg-slate-800"></div>
</div>
<div class="space-y-4">
<div class="h-32 w-full rounded-xl bg-white/80 dark:bg-slate-800"></div>
<div class="h-32 w-full rounded-xl bg-white/80 dark:bg-slate-800"></div>
<div class="h-32 w-full rounded-xl bg-white/80 dark:bg-slate-800"></div>
</div>
</div>
<!-- Bottom Sheet Modal -->
<div class="relative w-full bg-white dark:bg-slate-950 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col pt-2 pb-10">
<!-- Drag Handle -->
<div class="flex justify-center py-3">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</div>
<!-- Header -->
<div class="px-8 pt-4">
<div class="flex justify-between items-center mb-1">
<span class="text-primary font-semibold text-sm tracking-wider uppercase">Motivate Me</span>
<button class="text-slate-400 hover:text-slate-600 dark:text-slate-500">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Create Habit</h2>
</div>
<!-- Content -->
<div class="px-8 mt-8 space-y-8">
<!-- Large Habit Name Input -->
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Habit Title</label>
<input autofocus="" class="w-full bg-transparent border-none p-0 text-3xl font-bold text-slate-900 dark:text-slate-100 placeholder:text-slate-200 dark:placeholder:text-slate-800 focus:ring-0" placeholder="Morning Run" type="text"/>
<div class="h-px w-full bg-slate-100 dark:bg-slate-800"></div>
</div>
<!-- Point Stepper -->
<div class="flex items-center justify-between p-5 bg-background-light dark:bg-slate-900/50 rounded-2xl border border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-xl">
<span class="material-symbols-outlined text-primary text-2xl">stars</span>
</div>
<div>
<p class="text-slate-900 dark:text-slate-100 font-bold">Goal Points</p>
<p class="text-slate-500 text-sm">Reward per completion</p>
</div>
</div>
<div class="flex items-center gap-5">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-900 dark:text-white font-bold text-xl">remove</span>
</button>
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100 w-8 text-center">15</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-900 dark:text-white font-bold text-xl">add</span>
</button>
</div>
</div>
<!-- Sleek Toggles -->
<div class="space-y-4">
<div class="flex items-center justify-between py-2">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-900 rounded-lg">
<span class="material-symbols-outlined text-slate-500">notifications_active</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">Daily Reminder</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer custom-toggle" type="checkbox"/>
<div class="w-12 h-6 bg-slate-200 dark:bg-slate-800 rounded-full peer-checked:bg-primary transition-colors after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-6"></div>
</label>
</div>
<div class="flex items-center justify-between py-2">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-900 rounded-lg">
<span class="material-symbols-outlined text-slate-500">public</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-medium">Public Challenge</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer custom-toggle" type="checkbox"/>
<div class="w-12 h-6 bg-slate-200 dark:bg-slate-800 rounded-full peer-checked:bg-primary transition-colors after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-6"></div>
</label>
</div>
</div>
<!-- Create Button -->
<div class="pt-6">
<button class="w-full bg-primary py-5 rounded-2xl text-white font-bold text-lg shadow-xl shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Create Habit</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="flex justify-center mt-8">
<div class="h-1.5 w-32 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</div>
</div>
</div>
</body></html>
